# ═══════════════════════════════════════════════════════════════
# Jules Agent Workflow — TEMPLATE
# ═══════════════════════════════════════════════════════════════
# Questo file viene deployato automaticamente nei repo target
# dal workflow deploy-workflows.yml del jules-controller.
#
# Triggers:
#   - workflow_dispatch: il controller lo chiama con un prompt
#   - issues con label "jules": per programmare da telefono
# ═══════════════════════════════════════════════════════════════

name: Jules Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Jules agent'
        required: true
        type: string

  issues:
    types: [labeled]

jobs:
  jules-dispatch:
    runs-on: ubuntu-latest

    # Per le issue: esegui solo se la label è "jules"
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'jules')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Invoke Jules (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: ${{ inputs.prompt }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}

      - name: Invoke Jules (issue trigger)
        if: github.event_name == 'issues'
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
