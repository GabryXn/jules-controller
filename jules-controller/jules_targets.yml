# ╔═══════════════════════════════════════════════════════════════╗
# ║              JULES CONTROLLER — TARGET CONFIG               ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  Questo file definisce i repository su cui Jules opererà    ║
# ║  e le automazioni cicliche da eseguire su ciascuno.         ║
# ║                                                             ║
# ║  📖 COME FUNZIONA:                                          ║
# ║  Ogni "target" è un repository GitHub.                      ║
# ║  Ogni target può avere più "automazioni", ognuna con        ║
# ║  un nome identificativo e un prompt che dice a Jules        ║
# ║  cosa fare.                                                 ║
# ║                                                             ║
# ║  ⏰ Il controller.yml eseguirà TUTTE le automazioni         ║
# ║  di TUTTI i target ogni notte alle 4:00 AM.                 ║
# ║                                                             ║
# ║  📱 Puoi anche comandare Jules dal telefono creando         ║
# ║  una Issue su un repo target con la label "jules".          ║
# ╚═══════════════════════════════════════════════════════════════╝


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TARGET ATTIVI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

targets:

  # ── RPG Life Companion ──────────────────
  - repo: "GabryXn/rpg-life-companion"
    automations:
      - name: "vulnerability-scan"
        schedule: "weekly"
        prompt: |
          Perform a targeted security audit on this repository.

          STEP 1 — ORIENTATION (mandatory before any changes):
          Read CLAUDE.md, AGENTS.md, or README.md. Identify the tech stack, the package
          manager in use (check for pnpm-lock.yaml, uv.lock, poetry.lock, etc.), and the
          command to run the existing test suite.

          STEP 2 — AUDIT (work through each item in order):

          a) DEPENDENCY CVEs
             Scan all dependency manifests (package.json, pyproject.toml, go.mod, Gemfile…).
             For each package with a known CVE, upgrade it to the minimum patched version.
             Upgrade ONE dependency at a time. Run the existing tests after each upgrade.
             If tests fail after an upgrade, revert that specific dependency and document it.

          b) HARDCODED SECRETS
             Search source files for hardcoded API keys, tokens, passwords, or credentials
             (patterns: api_key, secret, password, token, private_key, bearer, auth_token).
             Do NOT delete them — add a comment: # SECURITY: hardcoded credential — move to env var
             Never log or print the found values.

          c) INPUT VALIDATION
             Check that HTTP parameters, user inputs, and file paths are validated before
             reaching database queries, shell commands, or file operations.
             Patch unvalidated entry points with proper validation.

          d) INJECTION VECTORS
             Look for SQL injection, shell command injection, path traversal, and XSS.
             Fix confirmed vulnerabilities with the minimal necessary change only.

          STEP 3 — OUTPUT:
          - Create a PR ONLY if at least one real vulnerability was found and fixed or flagged.
          - PR title: "security: weekly audit — [N] issues found"
          - PR body must list each finding: type, file, line number, and action taken.
          - NEVER modify business logic as a side effect of security fixes.
          - NEVER merge the PR. Human review of all security changes is mandatory.
          - If no vulnerabilities are found, do NOT create a PR.

  # ── Bot Orchestrator Hub ────────────────
  - repo: "GabryXn/bot-orchestrator-hub"
