# ╔═══════════════════════════════════════════════════════════════╗
# ║              JULES CONTROLLER — TARGET CONFIG               ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  Questo file definisce i repository su cui Jules opererà    ║
# ║  e le automazioni cicliche da eseguire su ciascuno.         ║
# ║                                                             ║
# ║  📖 COME FUNZIONA:                                          ║
# ║  Ogni "target" è un repository GitHub.                      ║
# ║  Ogni target può avere più "automazioni", ognuna con        ║
# ║  un nome identificativo e un prompt che dice a Jules        ║
# ║  cosa fare.                                                 ║
# ║                                                             ║
# ║  ⏰ Il controller.yml eseguirà TUTTE le automazioni         ║
# ║  di TUTTI i target ogni notte alle 4:00 AM.                 ║
# ║                                                             ║
# ║  📱 Puoi anche comandare Jules dal telefono creando         ║
# ║  una Issue su un repo target con la label "jules".          ║
# ╚═══════════════════════════════════════════════════════════════╝


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TARGET ATTIVI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

targets:

  # ── RPG Life Companion ──────────────────
  - repo: "GabryXn/rpg-life-companion"
    automations:
      - name: "vulnerability-scan"
        prompt: |
          Esegui un'analisi completa di sicurezza e vulnerabilità su questo progetto:
          1. Controlla tutte le dipendenze per vulnerabilità note (CVE).
          2. Cerca hardcoded secrets, API keys o password nel codice.
          3. Verifica che gli input siano validati e sanitizzati correttamente.
          4. Controlla eventuali problemi di injection (SQL, command, XSS).
          5. Aggiorna le dipendenze vulnerabili alla versione sicura più recente.
          6. Esegui i test per verificare che tutto funzioni dopo le modifiche.
          7. Crea una PR solo se trovi e correggi vulnerabilità reali.

  # ── Bot Orchestrator Hub ────────────────
  - repo: "GabryXn/bot-orchestrator-hub"
    automations:
      - name: "vulnerability-scan"
        prompt: |
          Esegui un'analisi completa di sicurezza e vulnerabilità su questo progetto:
          1. Controlla tutte le dipendenze per vulnerabilità note (CVE).
          2. Cerca hardcoded secrets, API keys o password nel codice.
          3. Verifica che gli input siano validati e sanitizzati correttamente.
          4. Controlla eventuali problemi di injection (SQL, command, XSS).
          5. Aggiorna le dipendenze vulnerabili alla versione sicura più recente.
          6. Esegui i test per verificare che tutto funzioni dopo le modifiche.
          7. Crea una PR solo se trovi e correggi vulnerabilità reali.


