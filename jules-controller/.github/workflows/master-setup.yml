name: Jules Universal Setup (Secrets & Workflows)

on:
  schedule:
    - cron: '0 1 * * *' # 03:00 Rome Time
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout controller repository
        uses: actions/checkout@v4

      - name: 🔐 Validate Tokens
        id: validate_tokens
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          echo "🔍 Checking PAT_TOKEN validity..."
          if ! gh api user --silent; then
            echo "❌ ERROR: PAT_TOKEN is invalid or expired. Check repository secrets."
            exit 1
          fi
          echo "✅ PAT_TOKEN is valid."

          echo "🔍 Checking JULES_API_KEY presence..."
          if [ -z "$JULES_API_KEY" ]; then
            echo "❌ ERROR: JULES_API_KEY is missing. Check repository secrets."
            exit 1
          fi
          echo "✅ JULES_API_KEY is present."

      - name: Check Global Config
        id: check_config
        run: |
          ENABLED=$(yq eval '.features.workflow_deployment' jules_config.yml)
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT

      - name: Check Clasp Deployment Config
        id: check_clasp
        run: |
          CLASP_ENABLED=$(yq eval '.features.clasp_deployment // true' jules_config.yml)
          echo "clasp_enabled=$CLASP_ENABLED" >> $GITHUB_OUTPUT

      - name: 🚀 Run Sequential Setup
        if: steps.check_config.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_ENABLED: ${{ steps.check_clasp.outputs.clasp_enabled }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          TEMPLATE_AGENT="templates/jules_agent.yml"
          TEMPLATE_CLASP="templates/clasp_deploy.yml"
          TEMPLATE_REVIEWER="templates/jules_reviewer.yml"
          TEMPLATE_CODERABBIT="templates/.coderabbit.yaml"
          TEMPLATE_GITGUARDIAN="templates/gitguardian.yml"
          DEST_AGENT=".github/workflows/jules_agent.yml"
          DEST_CLASP=".github/workflows/clasp_deploy.yml"
          DEST_REVIEWER=".github/workflows/jules_reviewer.yml"
          DEST_CODERABBIT=".coderabbit.yaml"
          DEST_GITGUARDIAN=".github/workflows/gitguardian.yml"

          AGENT_CONTENT=$(base64 -w 0 "$TEMPLATE_AGENT")
          CLASP_CONTENT=$(base64 -w 0 "$TEMPLATE_CLASP")
          REVIEWER_CONTENT=$(base64 -w 0 "$TEMPLATE_REVIEWER")
          CODERABBIT_CONTENT=$(base64 -w 0 "$TEMPLATE_CODERABBIT")
          GITGUARDIAN_CONTENT=""
          if [ -f "$TEMPLATE_GITGUARDIAN" ]; then
            GITGUARDIAN_CONTENT=$(base64 -w 0 "$TEMPLATE_GITGUARDIAN")
          fi

          PR_REVIEW_ENABLED=$(yq eval '.features.pr_review // true' jules_config.yml)

          # Load clasp_targets.yml into a list of configured repos
          CLASP_TARGETS=""
          if [ -f "clasp_targets.yml" ] && [ "$CLASP_ENABLED" == "true" ]; then
            CLASP_TARGETS=$(yq eval '.clasp_targets[].repo' clasp_targets.yml 2>/dev/null || echo "")
            if [ -n "$CLASP_TARGETS" ]; then
              echo "📋 Clasp targets from config:"
              echo "$CLASP_TARGETS" | sed 's/^/  - /'
            fi
          fi

          # Get all non-archived repos where the user has push access (owner or collaborator)
          echo "🔍 Fetching repository list..."
          gh api --paginate "/user/repos?per_page=100" | jq -r '.[] | select(.archived == false and .permissions.push == true) | "\(.full_name) \(.default_branch) \(if .private then "private" else "public" end)"' > repos_list.txt

          # Build exclusion pattern from jules_config.yml
          EXCLUDED=$(yq eval '.excluded_repos[]' jules_config.yml 2>/dev/null | sed 's/[.[\*^${}\\+?|()]/\\&/g' | tr '\n' '|' | sed 's/|$//')
          echo "🚫 Excluded repos pattern: ${EXCLUDED:-'(none)'}"

          while read -r REPO DEFAULT_BRANCH VISIBILITY; do
            if [ "$REPO" == "$GITHUB_REPOSITORY" ]; then
              continue
            fi

            # Skip explicitly excluded repos (outside subshell so `continue` works on the outer loop)
            if [ -n "$EXCLUDED" ] && echo "$REPO" | grep -qE "^(${EXCLUDED})$"; then
              echo "⏩ Skipping excluded repo: $REPO"
              continue
            fi

            # Wrap in a subshell to ensure errors in one repo don't stop the loop
            (
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📦 Processing $REPO (Default Branch: $DEFAULT_BRANCH)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # 1. Sync Secrets
              echo "  🔑 Syncing JULES_API_KEY..."
              gh secret set JULES_API_KEY -R "$REPO" -b "$JULES_API_KEY" || echo "  ⚠️  Failed to set JULES_API_KEY"

              if [ -n "$CLASPRC_JSON" ]; then
                echo "  🔑 Syncing CLASPRC_JSON..."
                gh secret set CLASPRC_JSON -R "$REPO" -b "$CLASPRC_JSON" || echo "  ⚠️  Failed to set CLASPRC_JSON"
              fi

              # 2. Deploy jules_agent.yml (skip if content is identical)
              echo "  📄 Checking jules_agent.yml..."
              EXISTING_AGENT_JSON=$(gh api "repos/$REPO/contents/$DEST_AGENT" 2>/dev/null || echo "")
              EXISTING_SHA=""
              EXISTING_AGENT_B64=""
              if [ -n "$EXISTING_AGENT_JSON" ]; then
                EXISTING_SHA=$(echo "$EXISTING_AGENT_JSON" | jq -r '.sha // empty')
                EXISTING_AGENT_B64=$(echo "$EXISTING_AGENT_JSON" | jq -r '.content // empty' | tr -d '\n ')
              fi

              if [ -n "$EXISTING_SHA" ] && [ "$EXISTING_AGENT_B64" == "$AGENT_CONTENT" ]; then
                echo "  ⏩ jules_agent.yml is already up-to-date. Skipping."
              elif [ -n "$EXISTING_SHA" ]; then
                echo "  📄 Updating jules_agent.yml..."
                gh api --method PUT "repos/$REPO/contents/$DEST_AGENT" \
                  -f message="chore: update jules_agent.yml from controller" \
                  -f content="$AGENT_CONTENT" \
                  -f sha="$EXISTING_SHA" --silent || echo "  ⚠️  Failed to update jules_agent.yml"
              else
                echo "  📄 Adding jules_agent.yml..."
                gh api --method PUT "repos/$REPO/contents/$DEST_AGENT" \
                  -f message="chore: add jules_agent.yml from controller" \
                  -f content="$AGENT_CONTENT" --silent || echo "  ⚠️  Failed to add jules_agent.yml"
              fi

              # 3. Detect & Deploy clasp_deploy.yml (config-driven OR auto-detect)
              IS_CLASP_TARGET="false"
              if [ "$CLASP_ENABLED" == "true" ]; then
                # Check config-driven targets first
                if echo "$CLASP_TARGETS" | grep -qx "$REPO"; then
                  IS_CLASP_TARGET="true"
                  echo "  ✨ Clasp project (from clasp_targets.yml)"
                else
                  # Fallback: auto-detect .clasp.json in repo
                  HAS_CLASP=$(gh api "repos/$REPO/contents/.clasp.json" --silent > /dev/null 2>&1 && echo "true" || echo "false")
                  if [ "$HAS_CLASP" == "true" ]; then
                    IS_CLASP_TARGET="true"
                    echo "  ✨ Clasp project (auto-detected via .clasp.json)"
                  fi
                fi
              fi

              if [ "$IS_CLASP_TARGET" == "true" ]; then
                echo "  📄 Checking clasp_deploy.yml..."
                EXISTING_CLASP_JSON=$(gh api "repos/$REPO/contents/$DEST_CLASP" 2>/dev/null || echo "")
                CLASP_SHA=""
                EXISTING_CLASP_B64=""
                if [ -n "$EXISTING_CLASP_JSON" ]; then
                  CLASP_SHA=$(echo "$EXISTING_CLASP_JSON" | jq -r '.sha // empty')
                  EXISTING_CLASP_B64=$(echo "$EXISTING_CLASP_JSON" | jq -r '.content // empty' | tr -d '\n ')
                fi

                if [ -n "$CLASP_SHA" ] && [ "$EXISTING_CLASP_B64" == "$CLASP_CONTENT" ]; then
                  echo "  ⏩ clasp_deploy.yml is already up-to-date. Skipping."
                elif [ -n "$CLASP_SHA" ]; then
                  echo "  📄 Updating clasp_deploy.yml..."
                  gh api --method PUT "repos/$REPO/contents/$DEST_CLASP" \
                    -f message="chore: update clasp_deploy.yml from controller" \
                    -f content="$CLASP_CONTENT" \
                    -f sha="$CLASP_SHA" --silent || echo "  ⚠️  Failed to update clasp_deploy.yml"
                else
                  echo "  📄 Adding clasp_deploy.yml..."
                  gh api --method PUT "repos/$REPO/contents/$DEST_CLASP" \
                    -f message="chore: add clasp_deploy.yml from controller" \
                    -f content="$CLASP_CONTENT" --silent || echo "  ⚠️  Failed to add clasp_deploy.yml"
                fi
              else
                echo "  ⏩ Not a Clasp project. Skipping clasp_deploy.yml."
              fi

              # 4. Ensure 'jules' label (POST then PATCH to ensure color/description)
              echo "  🏷️ Ensuring 'jules' label..."
              gh api --method POST /repos/$REPO/labels \
                -f name='jules' \
                -f description='Trigga il Google Jules AI Agent' \
                -f color='6B46C1' --silent 2>/dev/null || \
              gh api --method PATCH /repos/$REPO/labels/jules \
                -f description='Trigga il Google Jules AI Agent' \
                -f color='6B46C1' --silent || echo "  ⚠️  Failed to sync 'jules' label"

              # 5. Apply Branch Protection (Only if default_branch is not null/empty)
              if [ -n "$DEFAULT_BRANCH" ] && [ "$DEFAULT_BRANCH" != "null" ]; then
                echo "  🛡️ Setting up Branch Protection on '$DEFAULT_BRANCH'..."
                gh api --method PUT "/repos/$REPO/branches/$DEFAULT_BRANCH/protection" \
                  -f required_status_checks='null' \
                  -H "Accept: application/vnd.github.v3+json" \
                  -f enforce_admins=true \
                  -F required_pull_request_reviews='{"dismiss_stale_reviews":true,"require_code_owner_reviews":false,"required_approving_review_count":0}' \
                  -f restrictions='null' \
                  -f allow_force_pushes=false \
                  -f allow_deletions=false \
                  --silent 2>/dev/null || echo "  ⚠️  Could not apply branch protection (check PAT permissions)"
              else
                echo "  ⏩ Skipping branch protection (empty repository or no default branch)."
              fi

              # 6. Enable Auto-delete head branches
              echo "  🧹 Enabling 'delete head branches' on merge..."
              gh repo edit "$REPO" --delete-branch-on-merge --silent || echo "  ⚠️  Could not enable auto-delete head branches"

              # 7. PR Review Tooling (public → CodeRabbit, private → Gemini Flash)
              if [ "$PR_REVIEW_ENABLED" == "true" ]; then
                if [ "$VISIBILITY" == "private" ]; then
                  # Private: sync GEMINI_API_KEY + deploy jules_reviewer.yml
                  if [ -n "$GEMINI_API_KEY" ]; then
                    echo "  🔑 Syncing GEMINI_API_KEY (private repo)..."
                    gh secret set GEMINI_API_KEY -R "$REPO" -b "$GEMINI_API_KEY" || echo "  ⚠️  Failed to set GEMINI_API_KEY"
                  else
                    echo "  ⚠️  GEMINI_API_KEY not set in controller — Gemini review will skip on this repo"
                  fi

                  echo "  📄 Checking jules_reviewer.yml (private repo)..."
                  EXISTING_REVIEWER_JSON=$(gh api "repos/$REPO/contents/$DEST_REVIEWER" 2>/dev/null || echo "")
                  EXISTING_REVIEWER_SHA=$(echo "$EXISTING_REVIEWER_JSON" | jq -r '.sha // empty' 2>/dev/null || echo "")
                  EXISTING_REVIEWER_B64=$(echo "$EXISTING_REVIEWER_JSON" | jq -r '.content // empty' 2>/dev/null | tr -d '\n ' || echo "")

                  if [ -n "$EXISTING_REVIEWER_SHA" ] && [ "$EXISTING_REVIEWER_B64" == "$REVIEWER_CONTENT" ]; then
                    echo "  ⏩ jules_reviewer.yml is already up-to-date. Skipping."
                  elif [ -n "$EXISTING_REVIEWER_SHA" ]; then
                    gh api --method PUT "repos/$REPO/contents/$DEST_REVIEWER" \
                      -f message="chore: update jules_reviewer.yml from controller" \
                      -f content="$REVIEWER_CONTENT" \
                      -f sha="$EXISTING_REVIEWER_SHA" --silent || echo "  ⚠️  Failed to update jules_reviewer.yml"
                    echo "  ✅ jules_reviewer.yml updated."
                  else
                    gh api --method PUT "repos/$REPO/contents/$DEST_REVIEWER" \
                      -f message="chore: add jules_reviewer.yml from controller" \
                      -f content="$REVIEWER_CONTENT" --silent || echo "  ⚠️  Failed to add jules_reviewer.yml"
                    echo "  ✅ jules_reviewer.yml added."
                  fi

                  # Remove .coderabbit.yaml if previously deployed to this repo
                  STALE_CR_JSON=$(gh api "repos/$REPO/contents/$DEST_CODERABBIT" 2>/dev/null || echo "")
                  STALE_CR_SHA=$(echo "$STALE_CR_JSON" | jq -r '.sha // empty' 2>/dev/null || echo "")
                  if [ -n "$STALE_CR_SHA" ]; then
                    echo "  🧹 Removing .coderabbit.yaml from private repo..."
                    gh api --method DELETE "repos/$REPO/contents/$DEST_CODERABBIT" \
                      -f message="chore: remove .coderabbit.yaml (private repo uses Gemini reviewer)" \
                      -f sha="$STALE_CR_SHA" --silent 2>/dev/null || true
                  fi

                else
                  # Public: deploy .coderabbit.yaml
                  echo "  📄 Checking .coderabbit.yaml (public repo)..."
                  EXISTING_CR_JSON=$(gh api "repos/$REPO/contents/$DEST_CODERABBIT" 2>/dev/null || echo "")
                  EXISTING_CR_SHA=$(echo "$EXISTING_CR_JSON" | jq -r '.sha // empty' 2>/dev/null || echo "")
                  EXISTING_CR_B64=$(echo "$EXISTING_CR_JSON" | jq -r '.content // empty' 2>/dev/null | tr -d '\n ' || echo "")

                  if [ -n "$EXISTING_CR_SHA" ] && [ "$EXISTING_CR_B64" == "$CODERABBIT_CONTENT" ]; then
                    echo "  ⏩ .coderabbit.yaml is already up-to-date. Skipping."
                  elif [ -n "$EXISTING_CR_SHA" ]; then
                    gh api --method PUT "repos/$REPO/contents/$DEST_CODERABBIT" \
                      -f message="chore: update .coderabbit.yaml from controller" \
                      -f content="$CODERABBIT_CONTENT" \
                      -f sha="$EXISTING_CR_SHA" --silent || echo "  ⚠️  Failed to update .coderabbit.yaml"
                    echo "  ✅ .coderabbit.yaml updated."
                  else
                    gh api --method PUT "repos/$REPO/contents/$DEST_CODERABBIT" \
                      -f message="chore: add .coderabbit.yaml from controller" \
                      -f content="$CODERABBIT_CONTENT" --silent || echo "  ⚠️  Failed to add .coderabbit.yaml"
                    echo "  ✅ .coderabbit.yaml added."
                  fi

                  # Remove jules_reviewer.yml if previously deployed to this repo
                  STALE_REVIEWER_JSON=$(gh api "repos/$REPO/contents/$DEST_REVIEWER" 2>/dev/null || echo "")
                  STALE_REVIEWER_SHA=$(echo "$STALE_REVIEWER_JSON" | jq -r '.sha // empty' 2>/dev/null || echo "")
                  if [ -n "$STALE_REVIEWER_SHA" ]; then
                    echo "  🧹 Removing jules_reviewer.yml from public repo (uses CodeRabbit instead)..."
                    gh api --method DELETE "repos/$REPO/contents/$DEST_REVIEWER" \
                      -f message="chore: remove jules_reviewer.yml (public repo uses CodeRabbit)" \
                      -f sha="$STALE_REVIEWER_SHA" --silent 2>/dev/null || true
                  fi
                fi
              fi

              # 8. GitGuardian secret scanning (all repos, requires GITGUARDIAN_API_KEY)
              if [ -n "$GITGUARDIAN_CONTENT" ] && [ -n "$GITGUARDIAN_API_KEY" ]; then
                echo "  🔑 Syncing GITGUARDIAN_API_KEY..."
                gh secret set GITGUARDIAN_API_KEY -R "$REPO" -b "$GITGUARDIAN_API_KEY" || echo "  ⚠️  Failed to set GITGUARDIAN_API_KEY"

                echo "  📄 Checking gitguardian.yml..."
                EXISTING_GG_JSON=$(gh api "repos/$REPO/contents/$DEST_GITGUARDIAN" 2>/dev/null || echo "")
                EXISTING_GG_SHA=$(echo "$EXISTING_GG_JSON" | jq -r '.sha // empty' 2>/dev/null || echo "")
                EXISTING_GG_B64=$(echo "$EXISTING_GG_JSON" | jq -r '.content // empty' 2>/dev/null | tr -d '\n ' || echo "")

                if [ -n "$EXISTING_GG_SHA" ] && [ "$EXISTING_GG_B64" == "$GITGUARDIAN_CONTENT" ]; then
                  echo "  ⏩ gitguardian.yml is already up-to-date. Skipping."
                elif [ -n "$EXISTING_GG_SHA" ]; then
                  gh api --method PUT "repos/$REPO/contents/$DEST_GITGUARDIAN" \
                    -f message="chore: update gitguardian.yml from controller" \
                    -f content="$GITGUARDIAN_CONTENT" \
                    -f sha="$EXISTING_GG_SHA" --silent || echo "  ⚠️  Failed to update gitguardian.yml"
                  echo "  ✅ gitguardian.yml updated."
                else
                  gh api --method PUT "repos/$REPO/contents/$DEST_GITGUARDIAN" \
                    -f message="chore: add gitguardian.yml from controller" \
                    -f content="$GITGUARDIAN_CONTENT" --silent || echo "  ⚠️  Failed to add gitguardian.yml"
                  echo "  ✅ gitguardian.yml added."
                fi
              else
                echo "  ℹ️  GITGUARDIAN_API_KEY not set — skipping GitGuardian deployment"
              fi

              echo "  ✅ Done for $REPO"
            ) || echo "❌ Fatal error processing $REPO"
            echo ""
          done < repos_list.txt
