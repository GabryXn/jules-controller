# ═══════════════════════════════════════════════════════════════
# Jules Agent Workflow — TEMPLATE
# ═══════════════════════════════════════════════════════════════
# Questo file viene deployato automaticamente nei repo target
# dal workflow deploy-workflows.yml del jules-controller.
#
# Triggers:
#   - workflow_dispatch: il controller lo chiama con un prompt
#   - issues con label "jules": per programmare da telefono
# ═══════════════════════════════════════════════════════════════

name: Jules Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Jules agent'
        required: true
        type: string

  issues:
    types: [labeled]

jobs:
  jules-dispatch:
    runs-on: ubuntu-latest

    # Per le issue: esegui solo se la label è "jules"
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'jules')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Invoke Jules (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            You are a Senior Software Engineer working autonomously on this GitHub repository.
            Trigger source: Direct dispatch

            ## ORIENTATION — complete this before touching any file
            1. Read CLAUDE.md, AGENTS.md, or README.md to understand the project's conventions,
               architecture, and development commands. If none exist, infer from the codebase.
            2. Detect the package manager: pnpm-lock.yaml → pnpm | yarn.lock → yarn |
               package-lock.json → npm | uv.lock → uv | poetry.lock → poetry

            ## TASK
            --- TASK START ---
            ${{ inputs.prompt }}
            --- TASK END ---

            ## RULES
            - Only modify files directly required by the task. No out-of-scope refactoring.
            - Match existing code style and naming conventions.
            - Run existing tests and confirm they pass before submitting.
            - Submit all changes as a Pull Request with a clear title and description.
            - NEVER merge the PR. NEVER push directly to the default branch.
          jules_api_key: ${{ secrets.JULES_API_KEY }}

      - name: Invoke Jules (issue trigger)
        if: github.event_name == 'issues'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            You are a Senior Software Engineer working autonomously on this GitHub repository.
            Trigger source: GitHub Issue #${{ github.event.issue.number }}

            ## ORIENTATION — complete this before touching any file
            1. Read CLAUDE.md, AGENTS.md, or README.md to understand the project's conventions,
               architecture, and development commands. If none exist, infer from the codebase.
            2. Detect the package manager: pnpm-lock.yaml → pnpm | yarn.lock → yarn |
               package-lock.json → npm | uv.lock → uv | poetry.lock → poetry

            ## ISSUE TO RESOLVE
            --- USER REQUEST START ---
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
            --- USER REQUEST END ---

            ## RULES
            - Implement exactly what the issue describes. No extra features or cleanup.
            - Only modify files directly needed to resolve the issue.
            - Match existing code style and naming conventions.
            - Run existing tests and confirm they pass before submitting.
            - Create a PR referencing this issue (include "Closes #${{ github.event.issue.number }}").
            - NEVER merge the PR. NEVER push directly to the default branch.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
