# ═══════════════════════════════════════════════════════════════
# Jules PR Reviewer — Gemini Flash (Private Repos)
# ═══════════════════════════════════════════════════════════════
# Questo file viene deployato automaticamente nei repo PRIVATI
# dal master-setup.yml del jules-controller.
#
# Si attiva su ogni PR e usa Gemini Flash (API gratuita) per
# analizzare il diff e postare un verdict: SAFE / RISKY / BROKEN.
#
# Le PR BROKEN vengono chiuse automaticamente con un commento.
# ═══════════════════════════════════════════════════════════════

name: Jules PR Reviewer (Gemini)

on:
  pull_request:
    types: [opened, synchronize]

# Permessi necessari per commentare e chiudere PR
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the full diff of the PR
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --color=never 2>/dev/null || echo "")

          if [ -z "$DIFF" ]; then
            echo "⚠️ Could not fetch PR diff."
            echo "empty=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Truncate diff if too large (Gemini has token limits)
          DIFF_SIZE=$(echo "$DIFF" | wc -c)
          MAX_SIZE=60000
          if [ "$DIFF_SIZE" -gt "$MAX_SIZE" ]; then
            echo "⚠️ Diff too large ($DIFF_SIZE bytes), truncating to $MAX_SIZE bytes"
            DIFF=$(echo "$DIFF" | head -c $MAX_SIZE)
            DIFF="$DIFF\n\n[... DIFF TRUNCATED — too large for review ...]"
          fi

          # Save to file to avoid shell escaping issues
          echo "$DIFF" > /tmp/pr_diff.txt
          echo "empty=false" >> $GITHUB_OUTPUT

      - name: Get PR info
        if: steps.diff.outputs.empty != 'true'
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body' 2>/dev/null || echo "No description")

          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "$PR_BODY" > /tmp/pr_body.txt

      - name: Review with Gemini Flash
        if: steps.diff.outputs.empty != 'true'
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "⚠️ GEMINI_API_KEY not set. Skipping review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_TITLE=$(cat /tmp/pr_title.txt)
          PR_BODY=$(cat /tmp/pr_body.txt)
          DIFF=$(cat /tmp/pr_diff.txt)

          # Build the prompt
          PROMPT=$(cat <<'PROMPT_EOF'
          You are a Senior Code Reviewer. This Pull Request was generated by an autonomous
          AI coding agent (Jules / Gemini). Your job is to catch errors that AI agents
          commonly introduce before a human reviews and merges.

          Classify the PR as exactly one of:
          - SAFE: Code is correct, no bugs introduced, no regressions. Ready for human merge.
          - RISKY: Code may have issues but is not clearly broken. Needs careful human review.
          - BROKEN: Code has definitive errors — syntax errors, missing imports, broken logic,
            undefined variables, wrong types, or changes that obviously break existing behaviour.

          AI-SPECIFIC FAILURE CHECKLIST (check each one):
          1. Are all imported/required symbols actually defined or exported in the codebase?
          2. Are new functions called with the correct number and types of arguments?
          3. Are async/await patterns consistent with how the rest of the codebase uses them?
          4. Are there undefined variables or calls to non-existent methods/properties?
          5. Do database queries, API calls, or file operations handle errors and edge cases?
          6. Are there obvious null/undefined dereferences or missing null checks?
          7. Does the change break any existing interface contract (function signatures, API
             endpoints, exported types, database schema)?
          8. Are there any hardcoded secrets, credentials, or sensitive values introduced?
          9. If dependencies were added or changed, are they compatible with the existing stack?

          CLASSIFICATION RULES:
          - BROKEN only when you are certain the code will fail at runtime or compile time.
          - RISKY for anything concerning but not provably broken (logic gaps, missing edge cases,
            unclear side effects, performance regressions, potential security issues).
          - SAFE for pure documentation, test additions, config-only changes, or clearly correct code.
          - If diff is only comments, docs, or formatting → SAFE.
          - Uncertain between SAFE and RISKY → RISKY.
          - Uncertain between RISKY and BROKEN → RISKY.
          - Do NOT flag code style, naming conventions, or formatting preferences.

          Respond ONLY with valid JSON — no markdown, no text outside the JSON object:
          {"verdict": "SAFE|RISKY|BROKEN", "summary": "Una frase in italiano: cosa fa la PR e perché hai assegnato questo verdetto.", "issues": ["problema specifico 1 (file:riga se possibile)", "problema specifico 2"]}

          If SAFE: "issues" must be an empty array [].
          If RISKY or BROKEN: "issues" must list each specific problem found.
          PROMPT_EOF
          )

          # Build JSON payload using jq to handle escaping properly
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            --arg diff "$DIFF" \
            '{
              "contents": [{
                "parts": [{
                  "text": ($prompt + "\n\n## PR Title\n" + $title + "\n\n## PR Description\n" + $body + "\n\n## Diff\n```\n" + $diff + "\n```")
                }]
              }],
              "generationConfig": {
                "temperature": 0.1,
                "maxOutputTokens": 1024,
                "responseMimeType": "application/json"
              }
            }')

          # Call Gemini API
          RESPONSE=$(curl -s --connect-timeout 10 --max-time 60 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Extract the text response
          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$REVIEW" ]; then
            echo "⚠️ Gemini returned empty response."
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Raw Gemini response: $REVIEW"

          # Parse verdict
          VERDICT=$(echo "$REVIEW" | jq -r '.verdict // "RISKY"')
          SUMMARY=$(echo "$REVIEW" | jq -r '.summary // "Review non disponibile"')
          ISSUES=$(echo "$REVIEW" | jq -r '.issues // [] | if length == 0 then "Nessun problema trovato." else map("- " + .) | join("\n") end')

          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

          # Save issues to file (multiline)
          echo "$ISSUES" > /tmp/review_issues.txt
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Post review comment
        if: steps.diff.outputs.empty != 'true' && steps.gemini.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERDICT: ${{ steps.gemini.outputs.verdict }}
          SUMMARY: ${{ steps.gemini.outputs.summary }}
        run: |
          ISSUES=$(cat /tmp/review_issues.txt)

          # Set emoji and label based on verdict
          case "$VERDICT" in
            SAFE)   EMOJI="✅"; LABEL="jules-safe" ;;
            RISKY)  EMOJI="⚠️"; LABEL="jules-risky" ;;
            BROKEN) EMOJI="❌"; LABEL="jules-broken" ;;
            *)      EMOJI="❓"; LABEL="jules-risky"; VERDICT="RISKY" ;;
          esac

          # Build comment
          COMMENT=$(cat <<EOF
          ## $EMOJI Jules PR Review — $VERDICT

          **Sommario:** $SUMMARY

          ### Problemi trovati
          $ISSUES

          ---
          *Review automatica by Gemini Flash · [Jules Controller](https://github.com/GabryXn/jules-controller)*
          EOF
          )

          # Post comment
          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

          # Add label (create if not exists)
          gh label create "$LABEL" --color "$(
            case "$VERDICT" in
              SAFE)   echo "0E8A16" ;;
              RISKY)  echo "FBCA04" ;;
              BROKEN) echo "D93F0B" ;;
            esac
          )" --description "Jules auto-review: $VERDICT" --force 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$LABEL"

      - name: Auto-close BROKEN PRs
        if: steps.gemini.outputs.verdict == 'BROKEN'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚫 PR marked as BROKEN. Closing automatically."
          gh pr close ${{ github.event.pull_request.number }} \
            --comment "🤖 **Auto-chiusa**: Questa PR è stata classificata come **BROKEN** dalla review automatica. Il codice contiene errori evidenti. Riaprila manualmente se ritieni sia un falso positivo."
          # Delete the branch to keep the repo clean
          gh pr view ${{ github.event.pull_request.number }} --json headRefName -q '.headRefName' | xargs -I{} gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/{}" 2>/dev/null || true
