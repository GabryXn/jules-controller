name: Clasp Auto-Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - '.clasp.json'
      - 'scripts/**'
      - 'vite.config.*'
      - 'build.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Generate .clasp.json (if missing)
        env:
          CLASP_SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
          CLASP_ROOT_DIR: ${{ secrets.CLASP_ROOT_DIR }}
        run: |
          if [ -f ".clasp.json" ]; then
            echo "✅ Using existing .clasp.json"
          elif [ -n "$CLASP_SCRIPT_ID" ]; then
            ROOT_DIR="${CLASP_ROOT_DIR:-./dist}"
            echo "{\"scriptId\":\"$CLASP_SCRIPT_ID\",\"rootDir\":\"$ROOT_DIR\"}" > .clasp.json
            echo "✅ Generated .clasp.json (scriptId from secret, rootDir: $ROOT_DIR)"
          else
            echo "❌ ERROR: No .clasp.json found and CLASP_SCRIPT_ID secret is not set."
            echo "Set CLASP_SCRIPT_ID as a repository secret or commit .clasp.json to the repo."
            exit 1
          fi

      - name: 🛠️ Setup Package Manager
        id: setup-pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
            npm install -g pnpm
          elif [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Install Dependencies
        run: |
          if [ "${{ steps.setup-pm.outputs.pm }}" == "pnpm" ]; then
            pnpm install
          elif [ "${{ steps.setup-pm.outputs.pm }}" == "yarn" ]; then
            yarn install
          else
            npm install
          fi

      - name: 🚀 Build Project
        run: |
          if [ "${{ steps.setup-pm.outputs.pm }}" == "pnpm" ]; then
            pnpm run build
          elif [ "${{ steps.setup-pm.outputs.pm }}" == "yarn" ]; then
            yarn run build
          else
            npm run build
          fi

      - name: 🔐 Configure Clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "❌ ERROR: CLASPRC_JSON secret is missing."
            exit 1
          fi
          echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: 📤 Push to Apps Script
        run: |
          if [ "${{ steps.setup-pm.outputs.pm }}" == "pnpm" ]; then
            pnpm exec clasp push -f
          elif [ "${{ steps.setup-pm.outputs.pm }}" == "yarn" ]; then
            yarn clasp push -f
          else
            npx @google/clasp push -f
          fi

      - name: 📝 Deploy Summary
        if: always()
        run: |
          echo "### 📦 Clasp Auto-Deploy" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Success**: Code built and pushed to Google Apps Script." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Failed**: Deploy did not complete. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
