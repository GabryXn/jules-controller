# ═══════════════════════════════════════════════════════════════
# Jules Agent Workflow — TEMPLATE
# ═══════════════════════════════════════════════════════════════
# Questo file viene deployato automaticamente nei repo target
# dal workflow deploy-workflows.yml del jules-controller.
#
# Triggers:
#   - workflow_dispatch: il controller lo chiama con un prompt
#   - issues con label "jules": per programmare da telefono
# ═══════════════════════════════════════════════════════════════

name: Jules Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Jules agent'
        required: true
        type: string

  issues:
    types: [labeled]

jobs:
  jules-dispatch:
    runs-on: ubuntu-latest

    # Per le issue: esegui solo se la label è "jules"
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'jules')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Global Config (Centralized Control)
        id: check_config
        run: |
          echo "🔍 Fetching global configuration from master controller..."
          
          # Fetch the config from the master controller repo
          CONFIG_RAW=$(curl -s --connect-timeout 5 --retry 3 "https://raw.githubusercontent.com/GabryXn/jules-controller/main/jules_config.yml")
          
          if [ -z "$CONFIG_RAW" ]; then
            echo "⚠️  WARNING: Could not fetch global config (empty response or timeout)."
            echo "Proceeding with default (enabled) for safety, but check connection to GabryXn/jules-controller."
            CONFIG_JSON='{"features": {"issue_automation": true, "cyclic_automation": true}}'
          else
            CONFIG_JSON=$(echo "$CONFIG_RAW" | yq -o=json)
            echo "✅ Global configuration fetched successfully."
          fi
          
          if [ "${{ github.event_name }}" == "issues" ]; then
            ENABLED=$(echo "$CONFIG_JSON" | jq -r '.features.issue_automation // true')
            echo "Checking issue_automation: $ENABLED"
          else
            # For workflow_dispatch, the controller already checked, but we store for log consistency
            ENABLED="true"
            echo "Workflow triggered via dispatch (controller/manual). Automation is ENABLED."
          fi
          
          if [ "$ENABLED" != "true" ]; then
            echo "🛑 Automation is DISABLED in global config. Action will stop here."
          fi

          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT

      - name: Invoke Jules (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.check_config.outputs.enabled == 'true'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            You are a Senior Software Engineer working autonomously on this GitHub repository.
            Trigger source: Scheduled Automation (Calendar / Cron dispatch)

            ## ORIENTATION — complete this before touching any file
            1. Locate and read CLAUDE.md, AGENTS.md, or README.md (check in this order).
               These files contain project-specific conventions, architecture, and dev commands
               that you MUST follow. If none exist, infer conventions from the existing codebase.
            2. Detect the package manager from lock files present in the repo root:
               pnpm-lock.yaml → pnpm | yarn.lock → yarn | package-lock.json → npm
               uv.lock / pyproject.toml → uv  | poetry.lock → poetry | Pipfile → pipenv
            3. Use ONLY the detected package manager. Never mix or substitute it.
            4. Understand the project structure: identify source dirs, entry points, and test dirs.

            ## TASK
            --- TASK START ---
            ${{ inputs.prompt }}
            --- TASK END ---

            ## EXECUTION RULES — non-negotiable
            1. MINIMAL SCOPE: Only modify files directly required by the task.
               Do NOT refactor, clean up, rename, or reorganize anything outside the task scope,
               even if it looks like it "needs" it.
            2. STYLE CONSISTENCY: Match the existing code style, indentation, naming conventions,
               and architectural patterns already present. Do not impose external preferences.
            3. TEST SAFETY: If a test suite exists, run it after your changes and confirm it
               passes. Do NOT break existing tests. Only add or modify tests if explicitly required.
            4. PULL REQUEST REQUIRED: Submit ALL changes as a Pull Request — never commit directly.
               PR title must clearly state what was done.
               PR body must list every file modified and the reason for each change.
            5. NEVER MERGE: Do not merge the Pull Request under any circumstances.
               Human review and approval is mandatory before any merge.
            6. NEVER push directly to the default branch or any protected branch.
            7. IF BLOCKED: If the task cannot be completed safely (insufficient context, high
               regression risk, or ambiguous requirements), open a draft PR describing what was
               attempted, what was unclear, and what information is needed to proceed.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.repository.default_branch }}

      - name: Invoke Jules (issue trigger)
        if: github.event_name == 'issues' && steps.check_config.outputs.enabled == 'true'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            You are a Senior Software Engineer working autonomously on this GitHub repository.
            Trigger source: GitHub Issue #${{ github.event.issue.number }} (user-submitted task)

            ## ORIENTATION — complete this before touching any file
            1. Locate and read CLAUDE.md, AGENTS.md, or README.md (check in this order).
               These files contain project-specific conventions, architecture, and dev commands
               that you MUST follow. If none exist, infer conventions from the existing codebase.
            2. Detect the package manager from lock files present in the repo root:
               pnpm-lock.yaml → pnpm | yarn.lock → yarn | package-lock.json → npm
               uv.lock / pyproject.toml → uv  | poetry.lock → poetry | Pipfile → pipenv
            3. Use ONLY the detected package manager. Never mix or substitute it.
            4. Read the files most relevant to the issue before proposing any solution.

            ## ISSUE TO RESOLVE
            --- USER REQUEST START ---
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
            --- USER REQUEST END ---

            ## EXECUTION RULES — non-negotiable
            1. ISSUE SCOPE ONLY: Implement exactly what the issue describes. Do NOT add extra
               features, refactoring, or "improvements" not explicitly requested in the issue.
            2. MINIMAL SCOPE: Only modify files directly needed to resolve the issue.
            3. STYLE CONSISTENCY: Match the existing code style, naming conventions, and patterns.
            4. TEST SAFETY: If a test suite exists, run it after your changes and confirm it
               passes. Do NOT break existing tests.
            5. PULL REQUEST REQUIRED: Create a PR that references the issue.
               Include "Closes #${{ github.event.issue.number }}" in the PR body.
               Describe every file changed and why.
            6. NEVER MERGE: Do not merge the Pull Request under any circumstances.
               Human review and approval is mandatory before any merge.
            7. NEVER push directly to the default branch or any protected branch.
            8. IF AMBIGUOUS: If the issue is unclear, implement the most conservative
               interpretation and explicitly state your assumption in the PR description.
               Do not guess silently.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.repository.default_branch }}

      - name: 📝 Execution Summary
        if: always() && steps.check_config.outputs.enabled == 'true'
        run: |
          echo "### 🤖 Jules Execution Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Success**: Jules has processed the request." >> $GITHUB_STEP_SUMMARY
            echo "If changes were needed, a **Pull Request** has been created in this repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Failed**: Something went wrong during Jules execution." >> $GITHUB_STEP_SUMMARY
            echo "Check the logs of the previous steps for more details." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.event.repository.default_branch }}" >> $GITHUB_STEP_SUMMARY
