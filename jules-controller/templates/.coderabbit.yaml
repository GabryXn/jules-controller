# ═══════════════════════════════════════════════════════════════
# CodeRabbit Configuration — AUTO-DEPLOYED by jules-controller
# ═══════════════════════════════════════════════════════════════
# Deployed automatically to PUBLIC repositories only.
# CodeRabbit is free for open-source repos (coderabbit.ai).
# Private repos use jules_reviewer.yml (Gemini Flash) instead.
# ═══════════════════════════════════════════════════════════════

language: en

reviews:
  # Defensive mode: catch AI-agent errors before merge
  profile: assertive
  request_changes_workflow: true

  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[skip review]"
    path_filters:
      - "!**/*.lock"
      - "!**/pnpm-lock.yaml"
      - "!**/uv.lock"
      - "!**/package-lock.json"
      - "!**/*.min.js"
      - "!**/*.min.css"
      - "!**/dist/**"
      - "!**/build/**"
      - "!**/__pycache__/**"

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false

  # Defensive review prompt — optimized for AI-generated PRs (Jules/Gemini)
  instructions: |
    You are reviewing a Pull Request that was likely generated by an autonomous AI coding agent.
    Your PRIMARY mission is DEFENSIVE: catch errors before they reach production.

    MANDATORY CHECKLIST — verify every item:
    1. UNDEFINED REFERENCES: Are all imported/required symbols actually exported/defined in this repo?
    2. CALL SIGNATURES: Are new or modified functions called with the correct arguments everywhere in the codebase?
    3. ASYNC PATTERNS: Are async/await and Promise patterns consistent with how this codebase uses them?
    4. NULL SAFETY: Are there unguarded property accesses on values that could be null or undefined?
    5. ERROR HANDLING: Do new I/O operations (API calls, DB queries, file reads) handle failure cases?
    6. INTERFACE CONTRACTS: Does this change break existing function signatures, API endpoints, or exported types?
    7. HARDCODED SECRETS: Are there hardcoded credentials, tokens, API keys, or other sensitive values?
    8. DEPENDENCY COMPATIBILITY: Are new or changed dependencies compatible with the existing stack?
    9. LOGIC CORRECTNESS: Are there off-by-one errors, wrong conditions, or unhandled edge cases?
    10. REGRESSION RISK: Could this change silently break functionality in other parts of the codebase?

    WHEN TO BLOCK (request_changes):
    - Definite runtime errors (undefined variables, wrong argument count, type mismatches)
    - Hardcoded secrets or credentials of any kind
    - Breaking changes to existing API contracts without explicit versioning
    - Missing error handling on critical operations (authentication, data writes, payments)

    WHEN TO COMMENT ONLY (do not block):
    - Missing test coverage for new code paths
    - Performance concerns without evidence of impact
    - Minor null safety gaps in low-risk code paths
    - Non-critical missing edge cases

    DO NOT flag: code style, formatting, naming conventions, indentation, or personal preferences.
    Be concise. Each finding must include a file:line reference if possible.

  # Per-path guidance for high-risk areas
  path_instructions:
    - path: "**/*.env*"
      instructions: "Flag ANY secret or credential, even if it looks like a placeholder."
    - path: "**/auth/**"
      instructions: "Apply stricter scrutiny: verify all authentication flows, token handling, and session management are correct and cannot be bypassed."
    - path: "**/migrations/**"
      instructions: "Check for irreversible operations (DROP, column type changes). Flag if rollback strategy is missing."
    - path: "**/.github/workflows/**"
      instructions: "Check for secret exposure in logs, injection via untrusted inputs, and overly permissive permissions."

knowledge_base:
  learnings:
    scope: local

chat:
  auto_reply: true

tone_instructions: >
  Be direct and technical. No pleasantries or padding.
  State each finding as a concrete fact with file:line references.
  If nothing is wrong, say so in one sentence.
