# ═══════════════════════════════════════════════════════════════
# GitGuardian Security Scan — AUTO-DEPLOYED by jules-controller
# ═══════════════════════════════════════════════════════════════
# Scans every push and PR for hardcoded secrets, credentials,
# API keys, and other sensitive data using ggshield.
#
# Requires: GITGUARDIAN_API_KEY secret (free at gitguardian.com)
# ═══════════════════════════════════════════════════════════════

name: GitGuardian Security Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  scanning:
    name: Secrets scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
