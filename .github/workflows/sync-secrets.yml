name: Sync Jules API Key to Targets

on:
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject JULES_API_KEY into target repos
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          yq -o=json jules_targets.yml | jq -c '.targets[]' | while read -r item; do
            REPO=$(echo "$item" | jq -r '.repo')

            echo "Setting JULES_API_KEY on $REPO..."
            gh secret set JULES_API_KEY -R "$REPO" -b "$JULES_API_KEY"
            echo "✅ Done for $REPO"
          done
