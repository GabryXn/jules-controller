name: Sync Jules API Key to Targets

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject JULES_API_KEY into target repos
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          gh repo list GabryXn --limit 1000 --no-archived --json nameWithOwner --jq '.[].nameWithOwner' | while read -r REPO; do
            if [ "$REPO" == "GabryXn/jules-controller" ]; then
              echo "⏭️ Skipping self (jules-controller)"
              continue
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔧 Setting up $REPO"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # 1. Sync JULES_API_KEY
            echo "  🔑 Setting JULES_API_KEY..."
            gh secret set JULES_API_KEY -R "$REPO" -b "$JULES_API_KEY"
            
            # 2. Ensure 'jules' label exists
            echo "  🏷️ Ensuring 'jules' label exists..."
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/$REPO/labels \
              -f name='jules' \
              -f description='Trigga il Google Jules AI Agent' \
              -f color='715cd7' \
              --silent 2>/dev/null || true

            echo "  ✅ Done for $REPO"
            echo ""
          done
