name: Sync Jules API Key to Targets

on:
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject JULES_API_KEY into target repos
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          gh repo list GabryXn --limit 1000 --json nameWithOwner --jq '.[].nameWithOwner' | while read -r REPO; do

            echo "Setting JULES_API_KEY on $REPO..."
            gh secret set JULES_API_KEY -R "$REPO" -b "$JULES_API_KEY"
            echo "✅ Done for $REPO"
          done
