name: Deploy Jules Workflows to Targets

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout controller repository
        uses: actions/checkout@v4

      - name: Deploy jules_agent.yml and create label
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TEMPLATE_FILE="templates/jules_agent.yml"
          DEST_PATH=".github/workflows/jules_agent.yml"

          # Read the template content and base64 encode it
          CONTENT=$(base64 -w 0 "$TEMPLATE_FILE")

          # Iterate through all target repos
          gh repo list GabryXn --limit 1000 --no-archived --json nameWithOwner --jq '.[].nameWithOwner' | while read -r REPO; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 Processing $REPO"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # 1. Deploy the workflow file
            EXISTING_SHA=$(gh api "repos/$REPO/contents/$DEST_PATH" --jq '.sha' 2>/dev/null || echo "")

            if [ -n "$EXISTING_SHA" ]; then
              echo "  ↻ Updating existing workflow..."
              gh api --method PUT "repos/$REPO/contents/$DEST_PATH" \
                -f message="chore: update jules_agent.yml from controller" \
                -f content="$CONTENT" \
                -f sha="$EXISTING_SHA"
            else
              echo "  + Creating new workflow..."
              gh api --method PUT "repos/$REPO/contents/$DEST_PATH" \
                -f message="chore: add jules_agent.yml from controller" \
                -f content="$CONTENT"
            fi
            
            # 2. Add the 'jules' label
            echo "  🏷️ Ensuring 'jules' label exists..."
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/$REPO/labels \
              -f name='jules' \
              -f description='Trigga il Google Jules AI Agent' \
              -f color='715cd7' \
              --silent 2>/dev/null || true
              
            echo "  ✅ Done for $REPO"
            echo ""
          done
