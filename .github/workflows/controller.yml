name: Jules Master Controller

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  dispatch-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Jules on all targets
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          # Parse jules_targets.yml and trigger jules_agent.yml on each target
          # For each repo, iterate through its automations
          yq -o=json jules_targets.yml | jq -c '.targets[]' | while read -r target; do
            REPO=$(echo "$target" | jq -r '.repo')

            echo "$target" | jq -c '.automations[]' | while read -r automation; do
              NAME=$(echo "$automation" | jq -r '.name')
              PROMPT=$(echo "$automation" | jq -r '.prompt')

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🤖 Triggering [$NAME] on $REPO"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              gh workflow run jules_agent.yml \
                -R "$REPO" \
                -f prompt="$PROMPT"

              echo "✅ Dispatched [$NAME] on $REPO"
              echo ""
            done
          done
