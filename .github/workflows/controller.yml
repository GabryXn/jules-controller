name: Jules Master Controller

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  dispatch-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if feature is enabled
        id: check_config
        run: |
          ENABLED=$(yq eval '.features.cyclic_automation' jules_config.yml)
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT

      - name: Run Jules on all targets
        if: steps.check_config.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          echo "🚀 Starting Jules dispatch for all targets..."
          
          # Check for required tools
          for tool in yq jq gh; do
            if ! command -v $tool &> /dev/null; then
              echo "❌ ERROR: Required tool '$tool' is not installed."
              exit 1
            fi
          done

          # Parse jules_targets.yml and trigger jules_agent.yml on each target
          yq -o=json jules_targets.yml | jq -c '.targets[]' | while read -r target; do
            REPO=$(echo "$target" | jq -r '.repo')
            
            if [ -z "$REPO" ] || [ "$REPO" == "null" ]; then
              echo "⚠️  Skipping invalid target: $target"
              continue
            fi

            echo "📂 Processing repository: $REPO"

            echo "$target" | jq -c '.automations[]' | while read -r automation; do
              NAME=$(echo "$automation" | jq -r '.name')
              PROMPT=$(echo "$automation" | jq -r '.prompt')

              if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
                echo "  ⚠️  Skipping invalid automation in $REPO"
                continue
              fi

              echo "  🤖 Triggering [$NAME]..."
              
              if gh workflow run jules_agent.yml -R "$REPO" -f prompt="$PROMPT"; then
                echo "  ✅ Successfully dispatched [$NAME] to $REPO"
              else
                echo "  🚨 FAILED to dispatch [$NAME] to $REPO. Check PAT_TOKEN permissions and if jules_agent.yml exists in the target."
              fi
            done
            echo "---------------------------------------"
          done
          echo "🏁 All dispatches completed."
