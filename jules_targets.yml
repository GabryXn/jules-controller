# ═══════════════════════════════════════════════
# Jules Target Configuration
# ═══════════════════════════════════════════════
# Ogni progetto può avere multiple automazioni
# con prompt diversi. Sostituisci INSERISCI_TUO_USER
# con il tuo username GitHub.
# ═══════════════════════════════════════════════

targets:
  - repo: "INSERISCI_TUO_USER/nome-repo-backend"
    automations:
      - name: "security-scan"
        prompt: |
          Esegui una scansione di sicurezza sui pacchetti.
          Aggiorna le dipendenze vulnerabili.
          Esegui i test per verificare che tutto funzioni dopo gli aggiornamenti.
      - name: "dependency-update"
        prompt: |
          Controlla se ci sono dipendenze obsolete.
          Aggiornale alla versione stabile più recente.
          Esegui i test e crea una PR solo se passano tutti.

  - repo: "INSERISCI_TUO_USER/nome-repo-frontend"
    automations:
      - name: "performance-refactor"
        prompt: |
          Esegui un refactoring leggero per migliorare le performance.
          Cerca componenti che si ri-renderizzano inutilmente.
          Ottimizza i bundle size dove possibile.
      - name: "test-coverage"
        prompt: |
          Analizza la copertura dei test.
          Scrivi i test mancanti per le funzionalità critiche.
          Assicurati che la coverage superi l'80%.
