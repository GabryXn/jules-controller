# ==========================================
# JULES CONFIGURATION - CONTROL HUB
# ==========================================

# 1. Feature Switches (Abilitazione Moduli)
# Imposta su 'true' per attivare o 'false' per disattivare.
features:
  # Esecuzione automazioni cicliche definite in jules_targets.yml (controller.yml)
  cyclic_automation: false

  # Risposta alle Issue GitHub con label "jules" (jules_agent.yml)
  issue_automation: true

  # Trigger da Google Calendar Eventi (calendar-integration)
  calendar_automation: true

  # Sincronizzazione automatica workflow e secret sui repo target (deploy-workflows.yml)
  workflow_deployment: true

  # Auto-deploy su Google Apps Script per progetti Clasp (clasp_deploy.yml + clasp_targets.yml)
  clasp_deployment: true

# 2. Scheduling (Orari in formato HH:MM - Fuso Orario di ROMA)
# I cambiamenti qui aggiorneranno automaticamente i workflow di GitHub.
schedules:
  # Sincronizzazione secret e deployment workflow (Default suggerito: 03:00)
  # Gestito da: sync-secrets.yml e deploy-workflows.yml
  setup_sync_time: "03:00"

  # Esecuzione del Master Controller ciclico (Default suggerito: 04:00)
  # Gestito da: controller.yml
  master_controller_time: "04:00"
